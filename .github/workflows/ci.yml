# Test suite — runs on every PR and push to main. This job ("test") is the
# required status check for merging into main.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Tests run under plain Node — skip the Electron binary download for speed.
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - run: npm test
      - run: node test/guard.js
      - run: node test/worktree.js
      - run: node test/autopilot.js
      - run: node test/session.js
