# Windows build — NSIS installer on a windows runner. A v* tag also publishes
# the exe + latest.yml (the electron-updater feed for Windows) to the tag's
# draft GitHub Release, same flow as build-mac.yml. Unsigned for now, so
# SmartScreen warns on first run — a Windows code-signing cert is a separate
# pending item.
name: Build Windows

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write # electron-builder uploads release assets on tag builds

jobs:
  win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist -- --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Agenyra-win
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error
