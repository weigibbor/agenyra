# macOS build — signed with the GE Labs "Developer ID Application" cert and
# notarized when the repo secrets are present (falls back to unsigned, e.g. on
# forks). A v* tag also publishes dmg+zip+latest-mac.yml to the tag's draft
# GitHub Release: that feed is what shipped apps poll for auto-updates, and the
# update goes live the moment the draft release is published.
#
# Secrets (Settings → Secrets and variables → Actions):
#   MAC_CERT_P12 / MAC_CERT_PASSWORD         base64 .p12 export of the cert
#   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD   notarytool credentials
name: Build macOS

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write # electron-builder uploads release assets on tag builds

jobs:
  mac:
    runs-on: macos-latest
    env:
      # Publishing gates on this: an unsigned CI build must never overwrite the
      # signed dmg/zip/latest-mac.yml already uploaded from the Mac Mini.
      HAS_MAC_CERT: ${{ secrets.MAC_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # zip + dmg for x64 + arm64 (the zip is what the mac updater installs
      # from). electron-builder treats an EMPTY CSC_LINK as a real path ("not a
      # file" hard error), so strip empty cred vars first: no cert secret →
      # unsigned build, no Apple ID secret → notarization skipped with a warning.
      - run: |
          [ -n "$CSC_LINK" ] || unset CSC_LINK CSC_KEY_PASSWORD
          [ -n "$APPLE_ID" ] || unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          npm run dist:mac -- --x64 --arm64 --publish ${{ startsWith(github.ref, 'refs/tags/') && env.HAS_MAC_CERT == 'true' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: LE6BHLWBPY
      - uses: actions/upload-artifact@v4
        with:
          name: Agenyra-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: error
